<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS2 3D Aim Trainer</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    cursor: none;
    font-family: Arial, sans-serif;
    color: #fff;
}

#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: var(--crosshair-size, 22px);
    height: var(--crosshair-size, 22px);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
}

#crosshair .line {
    position: absolute;
    background: var(--crosshair-color, rgba(255,255,255,0.92));
}

#crosshair .line.left,
#crosshair .line.right {
    width: var(--crosshair-length, 12px);
    height: var(--crosshair-width, 2px);
    top: calc(50% - var(--crosshair-width, 2px) / 2);
}

#crosshair .line.left {
    left: 0;
}

#crosshair .line.right {
    right: 0;
}

#crosshair .line.top,
#crosshair .line.bottom {
    width: var(--crosshair-width, 2px);
    height: var(--crosshair-length, 12px);
    left: calc(50% - var(--crosshair-width, 2px) / 2);
}

#crosshair .line.top {
    top: 0;
}

#crosshair .line.bottom {
    bottom: 0;
}

#crosshair.t-style .line.top {
    display: none;
}

#crosshair .dot {
    position: absolute;
    width: var(--dot-size, 4px);
    height: var(--dot-size, 4px);
    background: var(--crosshair-color, rgba(255,255,255,0.92));
    border-radius: 50%;
    top: calc(50% - var(--dot-size, 4px) / 2);
    left: calc(50% - var(--dot-size, 4px) / 2);
}

#crosshair.no-dot .dot {
    display: none;
}

#hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    display: grid;
    gap: 6px;
}

.hud-item {
    background: rgba(0,0,0,0.55);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 16px;
    min-width: 140px;
}

#menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 24px;
    gap: 14px;
}

#menu h1 {
    margin: 0;
    font-size: 42px;
}

#menu p {
    margin: 0;
    max-width: 560px;
    font-size: 18px;
    line-height: 1.4;
}

#menu, #menu * {
    cursor: default;
}

button {
    background: #1f8cff;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
}

button:hover {
    transform: scale(1.03);
    background: #4aaaff;
}

</style>
</head>

<body>

<div id="crosshair">
    <div class="line top"></div>
    <div class="line left"></div>
    <div class="line right"></div>
    <div class="line bottom"></div>
    <div class="dot"></div>
</div>

<div id="hud">
    <div class="hud-item" id="score">Score: 0</div>
    <div class="hud-item" id="time">Time: 60s</div>
    <div class="hud-item" id="accuracy">Accuracy: 0%</div>
</div>

<div id="menu">
    <h1>CS2 3D Aim Trainer</h1>
    <p>Click Start to lock your cursor. Targets will spawn directly in front of you so you never have to search around the arena.</p>
    <button id="startBtn">Start Practice</button>
    <p>Move your mouse to aim and click to shoot.</p>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

let score = 0;
let hits = 0;
let shots = 0;
let timeLeft = 60;
let running = false;
let paused = false;
let soundEnabled = true;
let volume = 0.45;
let sensitivity = 1.0;
let targetSize = 0.4;
let crosshairColor = '#ffffff';
let crosshairLength = 12;
let crosshairWidth = 2;
let crosshairContainerSize = 22;
let dotEnabled = true;
let crosshairStyle = 'default';

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let lobbyOsc1 = null;
let lobbyOsc2 = null;
let lobbyGain = null;
let lobbyInterval = null;

// Multiplayer variables
let peer = null;
let conn = null;
let isHost = false;
let roomId = null;
let player = null;
let opponent = null;
let playerHealth = 100;
let opponentHealth = 100;
let keys = {};
let playerVelocity = new THREE.Vector3();
let opponentVelocity = new THREE.Vector3();

function saveSettings() {
    const settings = {
        sensitivity,
        volume,
        soundEnabled,
        crosshairColor,
        crosshairLength,
        crosshairWidth,
        crosshairContainerSize,
        crosshairStyle,
        dotEnabled,
    };
    try {
        localStorage.setItem('cs2AimTrainerSettings', JSON.stringify(settings));
    } catch (error) {
        console.warn('Unable to save trainer settings', error);
    }
}

function loadSettings() {
    try {
        const raw = localStorage.getItem('cs2AimTrainerSettings');
        if (!raw) return;
        const settings = JSON.parse(raw);
        if (typeof settings.sensitivity === 'number') sensitivity = settings.sensitivity;
        if (typeof settings.volume === 'number') volume = settings.volume;
        if (typeof settings.soundEnabled === 'boolean') soundEnabled = settings.soundEnabled;
        if (typeof settings.crosshairColor === 'string') crosshairColor = settings.crosshairColor;
        if (typeof settings.crosshairLength === 'number') crosshairLength = settings.crosshairLength;
        if (typeof settings.crosshairWidth === 'number') crosshairWidth = settings.crosshairWidth;
        if (typeof settings.crosshairContainerSize === 'number') crosshairContainerSize = settings.crosshairContainerSize;
        if (typeof settings.crosshairStyle === 'string') crosshairStyle = settings.crosshairStyle;
        if (typeof settings.dotEnabled === 'boolean') dotEnabled = settings.dotEnabled;
    } catch (error) {
        console.warn('Unable to load trainer settings', error);
    }
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101112);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.rotation.order = 'YXZ';
camera.position.set(0, 1.6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xffffff, 1.1);
mainLight.position.set(4, 10, 5);
scene.add(mainLight);

const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshStandardMaterial({ color: 0x191a1f, roughness: 0.94, metalness: 0.1 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
scene.add(floor);

const grid = new THREE.GridHelper(80, 80, 0x20222b, 0x18191f);
grid.position.y = 0.01;
scene.add(grid);

const backWall = new THREE.Mesh(
    new THREE.BoxGeometry(80, 10, 1),
    new THREE.MeshStandardMaterial({ color: 0x18181c, roughness: 0.96 })
);
backWall.position.set(0, 5, -30);
scene.add(backWall);

const targetLight = new THREE.PointLight(0xff8b8b, 1.3, 30);
targetLight.position.set(0, 4, -6);
scene.add(targetLight);

// Player models
const playerGeometry = new THREE.BoxGeometry(0.5, 1.8, 0.5);
const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
player = new THREE.Mesh(playerGeometry, playerMaterial);
player.position.set(0, 0.9, 0);
scene.add(player);

const opponentGeometry = new THREE.BoxGeometry(0.5, 1.8, 0.5);
const opponentMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
opponent = new THREE.Mesh(opponentGeometry, opponentMaterial);
opponent.position.set(5, 0.9, 0);
scene.add(opponent);

// Health bars
const playerHealthBar = document.createElement('div');
playerHealthBar.style.position = 'fixed';
playerHealthBar.style.top = '20px';
playerHealthBar.style.left = '20px';
playerHealthBar.style.width = '200px';
playerHealthBar.style.height = '20px';
playerHealthBar.style.background = 'red';
playerHealthBar.style.border = '2px solid white';
document.body.appendChild(playerHealthBar);

const opponentHealthBar = document.createElement('div');
opponentHealthBar.style.position = 'fixed';
opponentHealthBar.style.top = '20px';
opponentHealthBar.style.right = '20px';
opponentHealthBar.style.width = '200px';
opponentHealthBar.style.height = '20px';
opponentHealthBar.style.background = 'red';
opponentHealthBar.style.border = '2px solid white';
document.body.appendChild(opponentHealthBar);

function updateHealthBars() {
    playerHealthBar.style.width = `${playerHealth * 2}px`;
    opponentHealthBar.style.width = `${opponentHealth * 2}px`;
}

const targetGeometry = new THREE.SphereGeometry(0.4, 28, 28);
const targetMaterial = new THREE.MeshStandardMaterial({ color: 0xff4d4d, emissive: 0x880000, roughness: 0.18, metalness: 0.3 });
const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x226688, transparent: true, opacity: 0.45 });
const ringGeometry = new THREE.TorusGeometry(0.72, 0.06, 16, 120);

const target = new THREE.Group();
const sphere = new THREE.Mesh(targetGeometry, targetMaterial);
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2;
target.add(sphere, ring);
scene.add(target);
setTargetSize(targetSize);

function spawnTargetInView() {
    const distance = THREE.MathUtils.randFloat(4, 7.2);
    const horizontal = THREE.MathUtils.randFloat(-1.2, 1.2);
    const vertical = THREE.MathUtils.randFloat(0.5, 1.5);

    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward).normalize();

    const upVector = new THREE.Vector3(0, 1, 0);
    const right = new THREE.Vector3().crossVectors(forward, upVector).normalize();

    const spawn = new THREE.Vector3().copy(camera.position);
    spawn.add(forward.multiplyScalar(distance));
    spawn.add(right.multiplyScalar(horizontal));
    spawn.add(upVector.multiplyScalar(vertical));
    spawn.y = Math.max(0.8, Math.min(2.2, spawn.y));

    target.position.copy(spawn);
}

function setTargetSize(size) {
    targetSize = size;
    target.scale.setScalar(size);
}

function playTone(freq, duration = 0.08, type = 'sine') {
    if (!soundEnabled) return;
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playHitSound() {
    playTone(880, 0.06, 'triangle');
}

function playMissSound() {
    playTone(220, 0.06, 'square');
}

function playStartSound() {
    playTone(440, 0.08, 'sine');
    setTimeout(() => playTone(660, 0.1, 'sine'), 70);
}

function startLobbyAmbience() {
    if (lobbyOsc1) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    lobbyGain = audioCtx.createGain();
    lobbyGain.gain.value = 0.06;
    lobbyGain.connect(audioCtx.destination);

    lobbyOsc1 = audioCtx.createOscillator();
    lobbyOsc1.type = 'sine';
    lobbyOsc1.frequency.value = 120;
    lobbyOsc1.connect(lobbyGain);
    lobbyOsc1.start();

    lobbyOsc2 = audioCtx.createOscillator();
    lobbyOsc2.type = 'triangle';
    lobbyOsc2.frequency.value = 190;
    lobbyOsc2.connect(lobbyGain);
    lobbyOsc2.start();

    lobbyInterval = setInterval(() => {
        const now = audioCtx.currentTime;
        const target = 0.04 + Math.random() * 0.03;
        lobbyGain.gain.cancelScheduledValues(now);
        lobbyGain.gain.setValueAtTime(lobbyGain.gain.value, now);
        lobbyGain.gain.linearRampToValueAtTime(target, now + 1.2);
    }, 2600);
}

function stopLobbyAmbience() {
    if (lobbyInterval) {
        clearInterval(lobbyInterval);
        lobbyInterval = null;
    }
    if (lobbyOsc1) {
        lobbyOsc1.stop();
        lobbyOsc1.disconnect();
        lobbyOsc1 = null;
    }
    if (lobbyOsc2) {
        lobbyOsc2.stop();
        lobbyOsc2.disconnect();
        lobbyOsc2 = null;
    }
    if (lobbyGain) {
        lobbyGain.disconnect();
        lobbyGain = null;
    }
}

function applyCrosshairSettings() {
    setCrosshairColor(crosshairColor);
    setCrosshairLength(crosshairLength);
    setCrosshairWidth(crosshairWidth);
    setCrosshairSize(crosshairContainerSize);
    setDotVisible(dotEnabled);
    setCrosshairStyle(crosshairStyle);
}

spawnTargetInView();

const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const accuracyEl = document.getElementById('accuracy');
const menu = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');

function updateHUD() {
    const accuracy = shots === 0 ? 0 : Math.round((hits / shots) * 100);
    scoreEl.textContent = `Score: ${score}`;
    timeEl.textContent = `Time: ${Math.ceil(timeLeft)}s`;
    accuracyEl.textContent = `Accuracy: ${accuracy}%`;
}

function showStartMenu() {
    paused = false;
    running = false;
    menu.style.display = 'flex';
    menu.innerHTML = `
        <h1>CS2 3D Aim Trainer</h1>
        <p>Click Start to lock your cursor. Targets will spawn directly in front of you so you never have to search around the arena.</p>
        <button id="startBtn">Start Practice</button>
        <button id="oneVOneBtn">1v1</button>
        <p>Move your mouse to aim and click to shoot.</p>
    `;
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('oneVOneBtn').onclick = showOneVOneMenu;
    startLobbyAmbience();
}

function showPauseMenu() {
    paused = true;
    running = false;
    menu.style.display = 'flex';
    startLobbyAmbience();
    menu.innerHTML = `
        <h1>Paused</h1>
        <p>Escape has paused your run. Continue or tweak settings.</p>
        <button id="resumeBtn">Resume</button>
        <button id="restartBtn">Restart</button>
        <button id="lobbyBtn">Lobby</button>
        <div class="hud-item" style="text-align:left; max-width: 380px;">
            <label style="display:block; margin-bottom:10px;">Sensitivity <span id="sensValue">${sensitivity.toFixed(2)}</span>
                <input type="range" id="sensSlider" min="0.1" max="10" step="0.1" value="${sensitivity}">
            </label>
            <label style="display:block; margin-bottom:10px;">Crosshair style
                <select id="crosshairStyleSelect">
                    <option value="default" ${crosshairStyle === 'default' ? 'selected' : ''}>Default</option>
                    <option value="t" ${crosshairStyle === 't' ? 'selected' : ''}>T style</option>
                </select>
            </label>
            <label style="display:block; margin-bottom:10px;">Center dot <input type="checkbox" id="dotToggle" ${dotEnabled ? 'checked' : ''}></label>
            <label style="display:block; margin-bottom:10px;">Color <input type="color" id="crosshairColorPicker" value="${crosshairColor}"></label>
            <label style="display:block; margin-bottom:10px;">Length <input type="range" id="lengthSlider" min="8" max="40" step="1" value="${crosshairLength}"></label>
            <label style="display:block; margin-bottom:10px;">Width <input type="range" id="widthSlider" min="1" max="10" step="1" value="${crosshairWidth}"></label>
            <label style="display:block; margin-bottom:10px;">Size <input type="range" id="sizeSlider" min="18" max="44" step="1" value="${crosshairContainerSize}"></label>
            <label style="display:block; margin-bottom:10px;">Sound <input type="checkbox" id="soundToggle" ${soundEnabled ? 'checked' : ''}></label>
            <label style="display:block;">Volume <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="${volume}"></label>
        </div>
    `;
    document.getElementById('resumeBtn').onclick = () => {
        stopLobbyAmbience();
        menu.style.display = 'none';
        paused = false;
        running = true;
        document.body.requestPointerLock();
    };
    document.getElementById('restartBtn').onclick = () => {
        showStartMenu();
    };
    document.getElementById('lobbyBtn').onclick = () => {
        showStartMenu();
    };
    document.getElementById('sensSlider').oninput = (e) => {
        sensitivity = parseFloat(e.target.value);
        document.getElementById('sensValue').innerText = sensitivity.toFixed(2);
        saveSettings();
    };
    document.getElementById('crosshairStyleSelect').onchange = (e) => {
        setCrosshairStyle(e.target.value);
    };
    document.getElementById('dotToggle').onchange = (e) => {
        setDotVisible(e.target.checked);
    };
    document.getElementById('crosshairColorPicker').oninput = (e) => {
        setCrosshairColor(e.target.value);
    };
    document.getElementById('lengthSlider').oninput = (e) => {
        setCrosshairLength(parseFloat(e.target.value));
    };
    document.getElementById('widthSlider').oninput = (e) => {
        setCrosshairWidth(parseFloat(e.target.value));
    };
    document.getElementById('sizeSlider').oninput = (e) => {
        setCrosshairSize(parseFloat(e.target.value));
    };
    document.getElementById('soundToggle').onchange = (e) => {
        soundEnabled = e.target.checked;
        saveSettings();
    };
    document.getElementById('volumeSlider').oninput = (e) => {
        volume = parseFloat(e.target.value);
        saveSettings();
    };
}

function showEndMenu() {
    paused = false;
    running = false;
    if (document.pointerLockElement === document.body) {
        document.exitPointerLock();
    }
    menu.style.display = 'flex';
    startLobbyAmbience();
    menu.innerHTML = `
        <h1>Practice Complete</h1>
        <p>Score: ${score}</p>
        <p>Hits: ${hits} / ${shots}</p>
        <p>Accuracy: ${shots === 0 ? 0 : Math.round((hits / shots) * 100)}%</p>
        <button id="restartBtn">Restart</button>
        <button id="lobbyBtn">Lobby</button>
    `;
    document.getElementById('restartBtn').onclick = () => {
        showStartMenu();
    };
    document.getElementById('lobbyBtn').onclick = () => {
        showStartMenu();
    };
}

function endOneVOneGame(message) {
    running = false;
    document.exitPointerLock();
    menu.style.display = 'block';
    menu.innerHTML = `
        <h1>Game Over</h1>
        <p>${message}</p>
        <button id="backBtn">Back to Lobby</button>
    `;
    document.getElementById('backBtn').onclick = () => {
        if (peer) peer.destroy();
        showStartMenu();
    };
}

function resetGame() {
    score = 0;
    hits = 0;
    shots = 0;
    timeLeft = 60;
    running = true;
    paused = false;
    setTargetSize(targetSize);
    spawnTargetInView();
    updateHUD();
}

function startGame() {
    stopLobbyAmbience();
    menu.style.display = 'none';
    resetGame();
    document.body.requestPointerLock();
    playStartSound();
}

startBtn.onclick = startGame;
loadSettings();
applyCrosshairSettings();
startLobbyAmbience();

function showOneVOneMenu() {
    menu.innerHTML = `
        <h1>1v1 Mode</h1>
        <p>Create a room with your own code or join with a code.</p>
        <div style="margin: 20px 0;">
            <input type="text" id="customRoomCode" placeholder="Enter custom room code" style="padding: 10px; width: 200px;">
            <button id="createRoomBtn">Create Room</button>
        </div>
        <div style="margin: 20px 0;">
            <input type="text" id="roomCodeInput" placeholder="Enter room code to join" style="padding: 10px; width: 200px;">
            <button id="joinRoomBtn">Join Room</button>
        </div>
        <button id="backBtn">Back to Lobby</button>
    `;
    document.getElementById('createRoomBtn').onclick = createRoom;
    document.getElementById('joinRoomBtn').onclick = joinRoom;
    document.getElementById('backBtn').onclick = showStartMenu;
}

function createRoom() {
    const customCode = document.getElementById('customRoomCode').value.trim();
    if (!customCode) {
        alert('Please enter a custom room code.');
        return;
    }
    peer = new Peer(customCode);
    peer.on('open', (id) => {
        roomId = id;
        isHost = true;
        menu.innerHTML = `
            <h1>Room Created</h1>
            <p>Your room code: <strong>${roomId}</strong></p>
            <p>Waiting for opponent...</p>
            <button id="cancelBtn">Cancel</button>
        `;
        document.getElementById('cancelBtn').onclick = () => {
            peer.destroy();
            showOneVOneMenu();
        };
    });
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
        startOneVOneGame();
    });
    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            alert('Room code already taken. Choose another.');
            showOneVOneMenu();
        } else {
            alert('Error creating room: ' + err.message);
        }
    });
}

function joinRoom() {
    const code = document.getElementById('roomCodeInput').value.trim();
    if (!code) {
        alert('Please enter a room code.');
        return;
    }
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(code);
        conn.on('open', () => {
            setupConnection();
            startOneVOneGame();
        });
        conn.on('error', (err) => {
            alert('Failed to join room: ' + err.message);
            showOneVOneMenu();
        });
    });
}

function setupConnection() {
    conn.on('data', (data) => {
        if (data.type === 'position') {
            opponent.position.copy(data.position);
            opponent.rotation.y = data.rotationY;
        } else if (data.type === 'shoot') {
            // Handle shoot
            const raycaster = new THREE.Raycaster();
            raycaster.set(data.direction, data.origin);
            const intersects = raycaster.intersectObject(player, false);
            if (intersects.length > 0) {
                playerHealth -= 20;
                updateHealthBars();
                if (playerHealth <= 0) {
                    endOneVOneGame('You lost!');
                }
            }
        }
    });
}

function startOneVOneGame() {
    stopLobbyAmbience();
    menu.style.display = 'none';
    running = true;
    playerHealth = 100;
    opponentHealth = 100;
    updateHealthBars();
    document.body.requestPointerLock();
    playStartSound();
}

window.addEventListener('mousemove', (event) => {
    if (document.pointerLockElement === document.body && running) {
        camera.rotation.y -= event.movementX * 0.0025 * sensitivity;
        camera.rotation.x -= event.movementY * 0.0025 * sensitivity;
        camera.rotation.x = Math.max(-1.2, Math.min(1.2, camera.rotation.x));
    }
});

function setCrosshairStyle(style) {
    crosshairStyle = style;
    const crosshair = document.getElementById('crosshair');
    if (style === 't') {
        crosshair.classList.add('t-style');
    } else {
        crosshair.classList.remove('t-style');
    }
    saveSettings();
}

function setCrosshairColor(color) {
    crosshairColor = color;
    const crosshair = document.getElementById('crosshair');
    crosshair.style.setProperty('--crosshair-color', color);
    saveSettings();
}

function setCrosshairLength(length) {
    crosshairLength = length;
    const crosshair = document.getElementById('crosshair');
    crosshair.style.setProperty('--crosshair-length', `${length}px`);
    saveSettings();
}

function setCrosshairWidth(width) {
    crosshairWidth = width;
    const crosshair = document.getElementById('crosshair');
    crosshair.style.setProperty('--crosshair-width', `${width}px`);
    saveSettings();
}

function setCrosshairSize(size) {
    crosshairContainerSize = size;
    const crosshair = document.getElementById('crosshair');
    crosshair.style.setProperty('--crosshair-size', `${size}px`);
    saveSettings();
}

function setDotVisible(enabled) {
    dotEnabled = enabled;
    const crosshair = document.getElementById('crosshair');
    if (enabled) {
        crosshair.classList.remove('no-dot');
    } else {
        crosshair.classList.add('no-dot');
    }
    saveSettings();
}

window.addEventListener('click', () => {
    if (!running || document.pointerLockElement !== document.body) return;
    shots++;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const hitsArray = raycaster.intersectObject(target, true);
    if (hitsArray.length > 0) {
        score += 10;
        hits++;
        sphere.material.emissive.setHex(0xffff88);
        setTimeout(() => sphere.material.emissive.setHex(0x880000), 80);
        spawnTargetInView();
        playHitSound();
    } else {
        playMissSound();
    }
    updateHUD();

    // Multiplayer shooting
    if (conn) {
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyEuler(camera.rotation);
        conn.send({
            type: 'shoot',
            origin: camera.position,
            direction: direction
        });
    }
});

window.addEventListener('keydown', (event) => {
    if (event.code === 'Escape' && running) {
        if (document.pointerLockElement === document.body) {
            document.exitPointerLock();
        } else {
            showPauseMenu();
        }
    }
    keys[event.key.toLowerCase()] = true;
});

window.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement !== document.body && running && !paused) {
        showPauseMenu();
    }
});

window.addEventListener('keyup', (event) => {
    keys[event.key.toLowerCase()] = false;
});

function animate() {
    requestAnimationFrame(animate);
    if (running) {
        timeLeft -= 0.016;
        if (timeLeft <= 0) {
            timeLeft = 0;
            showEndMenu();
        }
        // Movement
        const speed = 0.05;
        playerVelocity.set(0, 0, 0);
        if (keys['w']) playerVelocity.z -= speed;
        if (keys['s']) playerVelocity.z += speed;
        if (keys['a']) playerVelocity.x -= speed;
        if (keys['d']) playerVelocity.x += speed;
        playerVelocity.applyEuler(new THREE.Euler(0, camera.rotation.y, 0));
        player.position.add(playerVelocity);

        // Send position to opponent
        if (conn) {
            conn.send({
                type: 'position',
                position: player.position,
                rotationY: camera.rotation.y
            });
        }

        // Update opponent position
        if (opponent) {
            opponentVelocity.set(0, 0, 0);
            // Opponent movement would be received via data
        }
    }
    target.rotation.y += 0.01;
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
